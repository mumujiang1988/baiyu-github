version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: visual-search-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: visual_search
      MYSQL_USER: vs_user
      MYSQL_PASSWORD: vs_pass123
    ports:
      - "3307:3306"
    volumes:
      - ./mysql/init:/docker-entrypoint-initdb.d
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # Milvus 向量数据库
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: visual-search-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd

  minio:
    image: minio/minio:latest
    container_name: visual-search-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.3.3
    container_name: visual-search-milvus
    restart: always
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio

  # ==========================
  # Rembg 抠图服务
  # ==========================
  rembg:
    image: danielgatis/rembg
    container_name: visual-search-rembg
    restart: always
    ports:
      - "7000:7000"         # 对外API端口7000映射到容器内7000
    command: s             # 启动 API 服务
    volumes:
      - rembg_models:/root/.u2net  # 模型缓存（避免重复下载）
    environment:
      - U2NET_HOME=/root/.u2net

  # FastAPI 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: visual-search-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=vs_user
      - MYSQL_PASSWORD=vs_pass123
      - MYSQL_DB=visual_search
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - OPENCLIP_MODEL=ViT-B-32
      - OPENCLIP_PRETRAINED=openai
      - HF_HUB_OFFLINE=0
      - HF_HUB_CACHE=/app/models_cache
      - TRANSFORMERS_CACHE=/app/models_cache
      - MODEL_CACHE_DIR=/app/models_cache
      - REMBG_API_URL=http://rembg:7000  # 给后端用的内部地址
      # MinIO 配置
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_SECURE=false
      - MINIO_BUCKET=product-images
      - USE_MINIO=true
    volumes:
      - ./backend:/app  # 挂载后端代码目录 (包含代码和storage目录)
      - backend_models:/app/models_cache  # 模型缓存使用命名卷
      - /d/baiyuyunma/baiyu-github/baiyu-github/OpenCLIP/visual-search/backend/storage:/app/storage  # 明确挂载存储目录
    depends_on:
      - mysql
      - milvus
      - minio  # 确保 minio 先启动
      - rembg  # 确保 rembg 先启动

  # Vue3 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: visual-search-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  etcd_data:
  minio_data:
  milvus_data:
  backend_models:
  rembg_models:  # 新增这个卷
