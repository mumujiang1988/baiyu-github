# ========================================
# 企业产品以图搜系统 - Docker Compose编排
# ========================================
version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: product-search-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: product_search
      MYSQL_USER: ${DB_USER:-product_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-product123456}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - product-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: product-search-backend
    restart: always
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=${DB_USER:-product_user}
      - DB_PASSWORD=${DB_PASSWORD:-product123456}
      - DB_NAME=product_search
      - DEBUG=false
      - LOG_LEVEL=INFO
      - CORS_ORIGINS=["http://localhost","http://localhost:80"]
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
      - faiss_index:/app
    networks:
      - product-network
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: product-search-frontend
    restart: always
    ports:
      - "80:80"
    networks:
      - product-network
    depends_on:
      - backend

  # Redis缓存（可选）
  redis:
    image: redis:7-alpine
    container_name: product-search-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - product-network
    command: redis-server --appendonly yes

  # Prometheus监控（可选）
  prometheus:
    image: prom/prometheus:latest
    container_name: product-search-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - product-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Grafana可视化（可选）
  grafana:
    image: grafana/grafana:latest
    container_name: product-search-grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123456
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    networks:
      - product-network
    depends_on:
      - prometheus

# 网络配置
networks:
  product-network:
    driver: bridge

# 数据卷
volumes:
  mysql_data:
    driver: local
  faiss_index:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
